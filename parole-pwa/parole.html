<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Parole</title>
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --border: #e2e0d8;
  --border-strong: #c8c4b8;
  --text: #1a1917;
  --text-muted: #6b6760;
  --accent: #1d4ed8;
  --accent-hover: #1e40af;
  --accent-light: #eff6ff;
  --danger: #dc2626;
  --danger-light: #fef2f2;
  --success: #16a34a;
  --success-light: #f0fdf4;
  --warning: #d97706;
  --warning-light: #fffbeb;
  --font: system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-mono: "SFMono-Regular", "Consolas", "Liberation Mono", Menlo, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

.surface {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s ease;
  border: 1px solid transparent;
  white-space: nowrap;
}

.btn-primary {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.btn-primary:hover { background: var(--accent-hover); }

.btn-secondary {
  background: var(--surface);
  color: var(--text);
  border-color: var(--border-strong);
}
.btn-secondary:hover { background: var(--bg); }

.btn-sm { padding: 4px 10px; font-size: 12px; }

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

thead tr {
  background: var(--bg);
  border-bottom: 2px solid var(--border);
}

th {
  padding: 10px 14px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  white-space: nowrap;
}

td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}

tbody tr:last-child td { border-bottom: none; }

.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 500;
}

.badge-gray { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); }

.app-shell { min-height: 100vh; }

.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 40;
}

.app-logo {
  font-size: 15px;
  font-weight: 600;
  font-family: var(--font-mono);
  letter-spacing: -0.02em;
  color: var(--text);
}

.app-logo span { color: var(--text-muted); font-weight: 400; }

.page { padding: 24px 16px 48px; max-width: 1400px; margin: 0 auto; }
.page-narrow { max-width: 640px; }
.page-mid { max-width: 680px; }

.section-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 16px;
}

.section-header {
  padding: 12px 16px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-body { padding: 16px; }

.hex-btn:active { transform: scale(0.92); }

.hex-wrap { position: relative; width: 236px; height: 236px; margin: 0 auto; }
.hex-tile { position: absolute; left: 50%; top: 50%; width: 72px; height: 68px; }
.hex-btn {
  width: 100%; height: 100%;
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  font-family: var(--font-mono); font-size: 24px; font-weight: 600; text-transform: uppercase;
  cursor: pointer; transition: transform 0.1s ease;
  display: flex; align-items: center; justify-content: center; padding: 0;
}
.hex-center { background: var(--accent); color: #fff; border: none; }
.hex-outer { background: var(--surface); color: var(--text); border: 1px solid var(--border-strong); }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center; z-index: 100;
}
.modal-box {
  width: 420px; max-width: 90vw; max-height: 80vh; overflow-y: auto; padding: 0;
  background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
}
.modal-head {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-weight: 600; font-size: 14px; }
.modal-close { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 16px; }
.modal-body { padding: 18px; }
.modal-body p { margin-bottom: 10px; font-size: 13px; line-height: 1.6; }
.modal-body p:last-child { margin-bottom: 0; }

.hidden { display: none !important; }
</style>
</head>
<body>

<div id="page-game" class="app-shell">
  <div class="app-header">
    <div class="app-logo">Parole<span>.</span></div>
    <div style="display:flex; gap:8px;">
      <button class="btn btn-secondary btn-sm" id="nav-soluzioni">&#128214; Soluzioni</button>
      <button class="btn btn-secondary btn-sm" id="btn-rules">&#8505; Regole</button>
    </div>
  </div>

  <div class="page page-narrow">
    <div id="date-line" style="text-align:center; font-size:12px; color:var(--text-muted); margin-bottom:16px; text-transform:capitalize;"></div>

    <button id="score-btn" class="surface" style="width:100%; padding:12px 16px; margin-bottom:20px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; border:1px solid var(--border);">
      <div style="display:flex; align-items:center; gap:8px;">
        <span style="color:var(--accent);">&#127942;</span>
        <span id="level-name" style="font-weight:600; font-size:14px;"></span>
      </div>
      <div id="level-detail" style="font-size:12px; color:var(--text-muted);"></div>
    </button>

    <div id="max-banner" class="surface hidden" style="padding:16px; margin-bottom:20px; background:var(--success-light); border-color:var(--success); text-align:center;">
      <div style="font-weight:600; color:var(--success); margin-bottom:4px;">&#127881; Livello massimo raggiunto! Partita conclusa.</div>
      <div id="max-banner-detail" style="font-size:12px; color:var(--text-muted);"></div>
    </div>

    <div id="input-display" style="text-align:center; font-size:28px; font-family:var(--font-mono); font-weight:600; letter-spacing:2px; min-height:40px; margin-bottom:8px; text-transform:uppercase;"></div>

    <div id="message-row" style="text-align:center; font-size:13px; font-weight:500; margin-bottom:8px; min-height:18px;"></div>

    <div id="hex-board" class="hex-wrap"></div>

    <div style="display:flex; justify-content:center; gap:10px; margin-top:24px; margin-bottom:28px;">
      <button class="btn btn-secondary" id="btn-delete">&#9003; Cancella</button>
      <button class="btn btn-secondary" id="btn-shuffle">&#128256; Mescola</button>
      <button class="btn btn-primary" id="btn-submit">&#8629; Invio</button>
    </div>

    <div class="section-card">
      <div class="section-header">Parole trovate (<span id="found-count">0</span>)</div>
      <div class="section-body" id="found-list" style="display:flex; flex-wrap:wrap; gap:8px;"></div>
    </div>
  </div>
</div>

<div id="page-soluzioni" class="app-shell hidden">
  <div class="app-header">
    <button class="btn btn-secondary btn-sm" id="nav-game">&#8592; Torna al gioco</button>
    <div style="font-size:14px; font-weight:600;">Soluzioni</div>
  </div>
  <div class="page page-mid">
    <div class="surface" style="padding:12px 16px; margin-bottom:16px; display:flex; align-items:center; justify-content:space-between;">
      <button class="btn btn-secondary btn-sm" id="sol-prev">&#8249; Giorno prima</button>
      <div id="sol-date" style="font-size:13px; font-weight:500; text-transform:capitalize;"></div>
      <button class="btn btn-secondary btn-sm" id="sol-next">Giorno dopo &#8250;</button>
    </div>

    <div class="surface" style="padding:16px; margin-bottom:16px; text-align:center;">
      <div style="font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px;">
        Lettere (gioco n. <span id="sol-day"></span>)
      </div>
      <div id="sol-letters" style="font-family:var(--font-mono); font-size:20px; font-weight:600;"></div>
    </div>

    <div class="section-card">
      <div class="section-header">Elenco parole possibili (<span id="sol-count"></span>)</div>
      <div class="section-body" id="sol-words" style="display:flex; flex-wrap:wrap; gap:8px;"></div>
    </div>
  </div>
</div>

<div id="modal-root"></div>

const LEVELS = [
  { name: "Principiante", pct: 0 },
  { name: "Buon inizio", pct: 2 },
  { name: "In crescita", pct: 5 },
  { name: "Niente male", pct: 8 },
  { name: "Promettente", pct: 15 },
  { name: "Solido", pct: 25 },
  { name: "Ottimo", pct: 40 },
  { name: "Fantastico", pct: 50 },
  { name: "Genio", pct: 70 },
];

const TOTAL_DAYS = PUZZLES.length;

function dayOfYear(date) {
  const start = new Date(date.getFullYear(), 0, 1);
  const diff = Math.floor((date.getTime() - start.getTime()) / 86400000);
  return diff + 1;
}

function dayIndexForDate(date) {
  const doy = dayOfYear(date);
  return ((doy - 1) % TOTAL_DAYS) + 1;
}

function getPuzzleForDate(date) {
  const idx = dayIndexForDate(date);
  return PUZZLES[idx - 1];
}

function puzzleLetters(puzzle) {
  return [...puzzle.outer, puzzle.center];
}

function scoreForWord(word) {
  return word.length === 4 ? 1 : word.length;
}

function maxScoreForPuzzle(puzzle) {
  return puzzle.words.reduce((sum, w) => sum + scoreForWord(w), 0);
}

function validateWord(word, puzzle, alreadyFound) {
  const w = word.trim().toLowerCase();
  if (w.length < 4) return { ok: false, reason: "Troppo corta: minimo 4 lettere" };
  if (!w.includes(puzzle.center)) return { ok: false, reason: "Manca la lettera centrale" };
  const allowed = new Set(puzzleLetters(puzzle));
  for (const ch of w) {
    if (!allowed.has(ch)) return { ok: false, reason: "Lettera non disponibile" };
  }
  if (alreadyFound.has(w)) return { ok: false, reason: "Parola già trovata" };
  if (!puzzle.words.includes(w)) return { ok: false, reason: "Non nell'elenco delle parole" };
  return { ok: true, points: scoreForWord(w) };
}

function levelForScore(score, maxScore) {
  let current = LEVELS[0];
  let index = 0;
  for (let i = 0; i < LEVELS.length; i++) {
    const threshold = Math.round((LEVELS[i].pct / 100) * maxScore);
    if (score >= threshold) {
      current = LEVELS[i];
      index = i;
    }
  }
  const isMax = index === LEVELS.length - 1;
  const nextLevel = isMax ? null : LEVELS[index + 1];
  const pointsToNext = nextLevel ? Math.max(0, Math.round((nextLevel.pct / 100) * maxScore) - score) : 0;
  return { level: current, index, isMax, nextLevel, pointsToNext };
}

function levelThresholds(maxScore) {
  return LEVELS.map(l => ({ name: l.name, points: Math.round((l.pct / 100) * maxScore) }));
}

function formatDateIt(date) {
  return date.toLocaleDateString("it-IT", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
}

function todayKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
}

function startOfDay(d) {
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

/* ---------- Gameplay state ---------- */
const now = new Date();
const puzzle = getPuzzleForDate(now);
const letters = puzzleLetters(puzzle);
const maxScore = maxScoreForPuzzle(puzzle);
const storageKey = `parole-game-${todayKey(now)}-${puzzle.day}`;

let outer = [...puzzle.outer];
let input = "";
let found = [];
let messageTimer = null;
let showRules = false;
let showScore = false;

(function loadFound() {
  try {
    const raw = localStorage.getItem(storageKey);
    if (raw) found = JSON.parse(raw);
  } catch (e) {}
})();

function saveFound() {
  localStorage.setItem(storageKey, JSON.stringify(found));
}

function computeScore() {
  return found.reduce((s, w) => s + scoreForWord(w), 0);
}

function flash(text, ok) {
  const el = document.getElementById("message-row");
  el.textContent = text;
  el.style.color = ok ? "var(--success)" : "var(--danger)";
  clearTimeout(messageTimer);
  messageTimer = setTimeout(() => { el.textContent = ""; }, 1600);
}

function renderInput() {
  const el = document.getElementById("input-display");
  el.innerHTML = "";
  for (const ch of input) {
    const span = document.createElement("span");
    span.textContent = ch;
    span.style.color = ch === puzzle.center ? "var(--accent)" : "var(--text)";
    el.appendChild(span);
  }
  const cursor = document.createElement("span");
  cursor.style.opacity = "0.3";
  cursor.textContent = "|";
  el.appendChild(cursor);
}

function renderFoundList() {
  document.getElementById("found-count").textContent = found.length;
  const list = document.getElementById("found-list");
  list.innerHTML = "";
  if (found.length === 0) {
    const empty = document.createElement("div");
    empty.style.color = "var(--text-muted)";
    empty.style.fontSize = "13px";
    empty.textContent = "Nessuna parola trovata, inizia a giocare!";
    list.appendChild(empty);
    return;
  }
  [...found].sort((a, b) => a.localeCompare(b)).forEach(w => {
    const span = document.createElement("span");
    span.className = "badge badge-gray";
    span.style.fontFamily = "var(--font-mono)";
    span.style.textTransform = "uppercase";
    span.innerHTML = `${w} <strong style="margin-left:4px;">${scoreForWord(w)}</strong>`;
    list.appendChild(span);
  });
}

function renderStatus() {
  const score = computeScore();
  const { level, isMax, nextLevel, pointsToNext } = levelForScore(score, maxScore);

  document.getElementById("level-name").textContent = level.name;
  document.getElementById("level-detail").textContent = isMax
    ? `Punteggio: ${score}`
    : `${score} pt · ${pointsToNext} al livello "${nextLevel.name}"`;

  const banner = document.getElementById("max-banner");
  if (isMax) {
    banner.classList.remove("hidden");
    document.getElementById("max-banner-detail").textContent = `${found.length} parole trovate · ${score} punti. Torna domani per un nuovo gioco.`;
  } else {
    banner.classList.add("hidden");
  }

  document.getElementById("btn-delete").disabled = isMax;
  document.getElementById("btn-submit").disabled = isMax;

  return { score, isMax };
}

function renderAll() {
  document.getElementById("date-line").textContent = `${formatDateIt(now)} · Gioco n. ${puzzle.day}`;
  renderInput();
  renderFoundList();
  renderStatus();
}

function submit() {
  const { isMax } = renderStatus();
  if (isMax) return;
  const result = validateWord(input, puzzle, new Set(found));
  if (result.ok && result.points) {
    found.push(input.trim().toLowerCase());
    saveFound();
    flash(`+${result.points} punti`, true);
  } else {
    flash(result.reason || "Parola non valida", false);
  }
  input = "";
  renderAll();
}

function shuffleOuter() {
  const copy = [...outer];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  outer = copy;
  buildHexBoard();
}

const HEX_SIZE = 72;
const RADIUS = 82;

function buildHexBoard() {
  const wrap = document.getElementById("hex-board");
  wrap.innerHTML = "";

  function makeHex(letter, variant, x, y) {
    const tile = document.createElement("div");
    tile.className = "hex-tile";
    tile.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
    const btn = document.createElement("button");
    btn.className = "hex-btn " + (variant === "center" ? "hex-center" : "hex-outer");
    btn.textContent = letter;
    btn.addEventListener("click", () => {
      const { isMax } = renderStatus();
      if (isMax) return;
      input += letter;
      renderInput();
    });
    tile.appendChild(btn);
    wrap.appendChild(tile);
  }

  makeHex(puzzle.center, "center", 0, 0);
  outer.forEach((letter, i) => {
    const angle = (Math.PI / 180) * (i * 60 - 90);
    const x = RADIUS * Math.cos(angle);
    const y = RADIUS * Math.sin(angle);
    makeHex(letter, "outer", x, y);
  });
}

window.addEventListener("keydown", e => {
  if (document.getElementById("page-game").classList.contains("hidden")) return;
  if (showRules || showScore) return;
  if (e.key === "Enter") {
    submit();
  } else if (e.key === "Backspace") {
    input = input.slice(0, -1);
    renderInput();
  } else if (/^[a-zA-Z]$/.test(e.key) && letters.includes(e.key.toLowerCase())) {
    const { isMax } = renderStatus();
    if (isMax) return;
    input += e.key.toLowerCase();
    renderInput();
  }
});

document.getElementById("btn-delete").addEventListener("click", () => {
  input = input.slice(0, -1);
  renderInput();
});
document.getElementById("btn-shuffle").addEventListener("click", shuffleOuter);
document.getElementById("btn-submit").addEventListener("click", submit);

/* ---------- Modals ---------- */
function openModal(title, bodyHtml) {
  const root = document.getElementById("modal-root");
  root.innerHTML = "";
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.addEventListener("click", closeModal);
  const box = document.createElement("div");
  box.className = "modal-box";
  box.addEventListener("click", e => e.stopPropagation());
  box.innerHTML = `
    <div class="modal-head">
      <div class="modal-title">${title}</div>
      <button class="modal-close" id="modal-close-btn">&#10005;</button>
    </div>
    <div class="modal-body">${bodyHtml}</div>
  `;
  overlay.appendChild(box);
  root.appendChild(overlay);
  document.getElementById("modal-close-btn").addEventListener("click", closeModal);
}

function closeModal() {
  document.getElementById("modal-root").innerHTML = "";
  showRules = false;
  showScore = false;
}

document.getElementById("btn-rules").addEventListener("click", () => {
  showRules = true;
  openModal("Regole", `
    <p>Crea quante più parole possibili con le lettere a disposizione. Le parole devono essere di almeno quattro
    lettere e contenere sempre la lettera centrale. La stessa lettera può essere usata più volte per comporre una
    parola.</p>
    <p>Più lunga è la parola, più punti ottieni. Clicca su Punteggio per vedere quanti punti servono per passare di
    livello. La partita finisce quando si raggiunge il livello massimo.</p>
    <p>L'elenco delle parole possibili è disponibile il giorno successivo, cliccando su Soluzioni nel menù.</p>
  `);
});

document.getElementById("score-btn").addEventListener("click", () => {
  showScore = true;
  const score = computeScore();
  const thresholds = levelThresholds(maxScore);
  const rows = thresholds.map(t => `
    <tr ${score >= t.points ? 'style="background:var(--accent-light);"' : ""}>
      <td>${t.name}</td>
      <td>${t.points}</td>
    </tr>
  `).join("");
  openModal("Punteggio", `
    <div style="font-size:12px; color:var(--text-muted); margin-bottom:12px;">
      Il tuo punteggio: <strong style="color:var(--text);">${score}</strong>
    </div>
    <table>
      <thead><tr><th>Livello</th><th>Punti necessari</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `);
});

/* ---------- Soluzioni view ---------- */
const solToday = startOfDay(new Date());
const solYesterday = (() => {
  const d = new Date(solToday);
  d.setDate(d.getDate() - 1);
  return d;
})();
let solSelected = new Date(solYesterday);

function renderSoluzioni() {
  const p = getPuzzleForDate(solSelected);
  document.getElementById("sol-date").textContent = formatDateIt(solSelected);
  document.getElementById("sol-day").textContent = p.day;

  const lettersEl = document.getElementById("sol-letters");
  lettersEl.innerHTML = "";
  puzzleLetters(p).forEach(l => {
    const span = document.createElement("span");
    span.textContent = l.toUpperCase();
    span.style.margin = "0 4px";
    span.style.color = l === p.center ? "var(--accent)" : "var(--text)";
    lettersEl.appendChild(span);
  });

  document.getElementById("sol-count").textContent = p.words.length;
  const wordsEl = document.getElementById("sol-words");
  wordsEl.innerHTML = "";
  p.words.forEach(w => {
    const span = document.createElement("span");
    span.className = "badge badge-gray";
    span.style.fontFamily = "var(--font-mono)";
    span.style.textTransform = "uppercase";
    span.innerHTML = `${w} <strong style="margin-left:4px;">${scoreForWord(w)}</strong>`;
    wordsEl.appendChild(span);
  });

  document.getElementById("sol-next").disabled = solSelected.getTime() >= solYesterday.getTime();
}

document.getElementById("sol-prev").addEventListener("click", () => {
  solSelected.setDate(solSelected.getDate() - 1);
  renderSoluzioni();
});
document.getElementById("sol-next").addEventListener("click", () => {
  if (solSelected.getTime() >= solYesterday.getTime()) return;
  solSelected.setDate(solSelected.getDate() + 1);
  renderSoluzioni();
});

/* ---------- Page navigation ---------- */
function showGamePage() {
  document.getElementById("page-soluzioni").classList.add("hidden");
  document.getElementById("page-game").classList.remove("hidden");
}
function showSoluzioniPage() {
  document.getElementById("page-game").classList.add("hidden");
  document.getElementById("page-soluzioni").classList.remove("hidden");
  renderSoluzioni();
}

document.getElementById("nav-soluzioni").addEventListener("click", showSoluzioniPage);
document.getElementById("nav-game").addEventListener("click", showGamePage);

/* ---------- Init ---------- */
buildHexBoard();
renderAll();
</script>
</body>
</html>
